<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-dim": "#00d4ec",
                        "surface-container-lowest": "#000000",
                        "secondary-dim": "#cbd5e8",
                        "surface-container-low": "#0e131d",
                        "tertiary-fixed": "#00e3fd",
                        "surface-container-high": "#19202c",
                        "outline-variant": "#434853",
                        "surface": "#090e17",
                        "on-tertiary": "#005762",
                        "outline": "#717581",
                        "on-tertiary-fixed-variant": "#005762",
                        "primary-fixed": "#0cb3ff",
                        "on-primary": "#003854",
                        "surface-variant": "#1f2633",
                        "on-tertiary-fixed": "#003840",
                        "secondary-fixed-dim": "#cbd5e8",
                        "on-secondary-fixed-variant": "#525c6c",
                        "background": "#090e17",
                        "tertiary-fixed-dim": "#00d4ec",
                        "error-container": "#9f0519",
                        "surface-container": "#141a25",
                        "tertiary-container": "#00e3fd",
                        "inverse-surface": "#f9f9ff",
                        "error": "#ff716c",
                        "secondary-container": "#3d4757",
                        "surface-bright": "#252c3b",
                        "inverse-primary": "#006593",
                        "primary-fixed-dim": "#00a5ec",
                        "on-secondary": "#485262",
                        "primary": "#5cbfff",
                        "surface-tint": "#5cbfff",
                        "surface-container-highest": "#1f2633",
                        "primary-container": "#0cb3ff",
                        "on-primary-fixed-variant": "#003752",
                        "tertiary": "#81ecff",
                        "on-primary-container": "#002d45",
                        "secondary": "#d9e3f7",
                        "on-secondary-container": "#c7d1e4",
                        "on-surface": "#e1e5f3",
                        "secondary-fixed": "#d9e3f7",
                        "on-error-container": "#ffa8a3",
                        "surface-dim": "#090e17",
                        "primary-dim": "#00a7f0",
                        "on-error": "#490006",
                        "inverse-on-surface": "#505560",
                        "on-primary-fixed": "#000d18",
                        "on-background": "#e1e5f3",
                        "on-surface-variant": "#a6abb7",
                        "error-dim": "#d7383b",
                        "on-tertiary-container": "#004d57",
                        "on-secondary-fixed": "#36404f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(25, 32, 44, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .data-grid-overlay {
            background-image: radial-gradient(circle, rgba(67, 72, 83, 0.15) 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col">
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4 relative overflow-hidden">
<!-- Decorative Background Element -->
<div class="absolute inset-0 data-grid-overlay pointer-events-none opacity-40"></div>
<div class="absolute top-1/4 -left-20 w-96 h-96 bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-tertiary/5 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Registration Card -->
<div class="w-full max-w-md relative">
<div class="glass-card rounded-xl overflow-hidden border border-outline-variant/15 shadow-2xl">
<!-- Progress Bar Container -->
<div class="h-1 w-full bg-surface-container-highest flex">
<div class="h-full w-1/2 bg-tertiary shadow-[0_0_10px_rgba(129,236,255,0.5)]"></div>
</div>
<div class="p-8 md:p-10">
<!-- Header Section -->
<div class="mb-10 text-center">
<h1 class="text-3xl font-headline font-bold text-on-surface tracking-tight mb-2">建立哨兵身份</h1>
<p class="text-on-surface-variant font-label text-[0.6875rem] uppercase tracking-[0.1em]">第一步：账号基础信息</p>
</div>
<!-- Form Section -->
<form class="space-y-6" id="register-form">
<div class="space-y-2">
<label class="flex items-center gap-2 font-label text-[0.6875rem] uppercase tracking-wider text-on-surface-variant ml-1">
<span>用户名 (Username)</span>
<span class="text-error" id="reg1-username-error"></span>
</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-sm" data-icon="person">person</span>
<input class="w-full bg-surface-container-lowest border-0 ring-1 ring-outline-variant/30 focus:ring-primary/40 rounded-lg py-3.5 pl-11 pr-4 text-on-surface placeholder:text-outline/50 transition-all outline-none" id="reg1-username" placeholder="输入您的唯一代号" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="flex items-center gap-2 font-label text-[0.6875rem] uppercase tracking-wider text-on-surface-variant ml-1">
<span>手机号 (Phone Number)</span>
<span class="text-error" id="reg1-phone-error"></span>
</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-sm" data-icon="smartphone">smartphone</span>
<input class="w-full bg-surface-container-lowest border-0 ring-1 ring-outline-variant/30 focus:ring-primary/40 rounded-lg py-3.5 pl-11 pr-4 text-on-surface placeholder:text-outline/50 transition-all outline-none" id="reg1-phone" placeholder="+86 138-0000-0000" type="tel"/>
</div>
</div>
<div class="space-y-2">
<label class="flex items-center gap-2 font-label text-[0.6875rem] uppercase tracking-wider text-on-surface-variant ml-1">
<span>密码 (Password)</span>
<span class="text-error" id="reg1-password-error"></span>
</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-sm" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-lowest border-0 ring-1 ring-outline-variant/30 focus:ring-primary/40 rounded-lg py-3.5 pl-11 pr-4 text-on-surface placeholder:text-outline/50 transition-all outline-none" id="reg1-password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-4 flex justify-center">
<button class="w-full py-4 px-8 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-lg shadow-[0_0_20px_rgba(92,191,255,0.2)] hover:shadow-[0_0_25px_rgba(92,191,255,0.4)] active:scale-95 transition-all uppercase tracking-widest text-sm" type="submit">
                                下一步
                            </button>
<p class="text-sm text-error min-h-5 text-center" id="register1-error"></p>
</div>
</form>
<!-- Footer Link -->
<div class="mt-8 pt-6 border-t border-outline-variant/10 text-center">
<a class="text-on-surface-variant hover:text-tertiary transition-colors text-xs font-label uppercase tracking-wider" href="/ui/Login.html">
                            已有账号？立即登录
                        </a>
</div>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-[#090e17] w-full py-8 mt-auto">
<div class="bg-gradient-to-r from-transparent via-[#434853]/15 to-transparent h-[1px] mb-8"></div>
<div class="flex flex-col items-center gap-4 max-w-7xl mx-auto px-6">
<div class="flex gap-8">
<a class="text-[#e1e5f3]/40 hover:text-[#5cbfff] font-['Inter'] text-[0.6875rem] uppercase tracking-[0.05em] transition-opacity opacity-80 hover:opacity-100" href="#">Protocol</a>
<a class="text-[#e1e5f3]/40 hover:text-[#5cbfff] font-['Inter'] text-[0.6875rem] uppercase tracking-[0.05em] transition-opacity opacity-80 hover:opacity-100" href="#">Privacy</a>
<a class="text-[#e1e5f3]/40 hover:text-[#5cbfff] font-['Inter'] text-[0.6875rem] uppercase tracking-[0.05em] transition-opacity opacity-80 hover:opacity-100" href="#">Security</a>
</div>
<p class="text-[#e1e5f3]/40 font-['Inter'] text-[0.6875rem] uppercase tracking-[0.05em]">© 2024 SENTINEL INTELLIGENCE UNIT</p>
</div>
<script src="/ui/src/register1-page.js" type="module"></script>
</footer>
<script>
  (function () {
    const map = {
      "detectAgent.html": "/ui/detectAgent.html",
      "monitor.html": "/ui/monitor.html",
      "reportHistory.html": "/ui/reportHistory.html",
      "detectSetting.html": "/ui/detectSetting.html",
      "infoSetting.html": "/ui/infoSetting.html"
    };

    const activeHref = map[window.location.pathname.split('/').pop()];
    if (!activeHref) return;

    const navLinks = Array.from(document.querySelectorAll('nav a[href]')).filter((a) =>
      ["/ui/detectAgent.html", "/ui/monitor.html", "/ui/reportHistory.html", "/ui/detectSetting.html", "/ui/infoSetting.html"].includes(a.getAttribute('href'))
    );

    navLinks.forEach((a) => {
      a.classList.remove('text-[#81ecff]', 'border-b-2', 'border-[#81ecff]', 'pb-1');
      a.classList.add('text-[#e1e5f3]', 'opacity-70');
    });

    const activeLink = navLinks.find((a) => a.getAttribute('href') === activeHref);
    if (!activeLink) return;

    activeLink.classList.remove('text-[#e1e5f3]', 'opacity-70');
    activeLink.classList.add('text-[#81ecff]', 'border-b-2', 'border-[#81ecff]', 'pb-1');
  })();
</script>
</body></html>
