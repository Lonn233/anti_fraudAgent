</div>
</div>

<!-- Login Container -->

<div class="glass-panel p-10 rounded-xl shadow-[0_0_64px_rgba(0,0,0,0.5)] border border-outline-variant/10 relative overflow-hidden">
<!-- Inner Texture -->

<div class="relative z-10">

</div>

<script src="/ui/src/login-page.js" type="module"></script>
<script>
  (function () {
    const map = {
      "detectAgent.html": "/ui/detectAgent.html",
      "monitor.html": "/ui/monitor.html",
      "reportHistory.html": "/ui/reportHistory.html",
      "detectSetting.html": "/ui/detectSetting.html",
      "infoSetting.html": "/ui/infoSetting.html"
    };

    const activeHref = map[window.location.pathname.split('/').pop()];
    if (!activeHref) return;

    const navLinks = Array.from(document.querySelectorAll('nav a[href]')).filter((a) =>
      ["/ui/detectAgent.html", "/ui/monitor.html", "/ui/reportHistory.html", "/ui/detectSetting.html", "/ui/infoSetting.html"].includes(a.getAttribute('href'))
    );

    navLinks.forEach((a) => {
      a.classList.remove('text-[#81ecff]', 'border-b-2', 'border-[#81ecff]', 'pb-1');
      a.classList.add('text-[#e1e5f3]', 'opacity-70');
    });

    const activeLink = navLinks.find((a) => a.getAttribute('href') === activeHref);
    if (!activeLink) return;

    activeLink.classList.remove('text-[#e1e5f3]', 'opacity-70');
    activeLink.classList.add('text-[#81ecff]', 'border-b-2', 'border-[#81ecff]', 'pb-1');
  })();
</script>
